# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Nginx Virtual Host — FlowState
# Domain: congcu.co
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Upstream — Next.js app
upstream flowstate_app {
    server app:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────
server {
    listen 80;
    server_name congcu.co www.congcu.co;

    # Certbot root để verify domain qua HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả HTTP sang HTTPS (trừ certbot challenge)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name congcu.co www.congcu.co;

    # SSL Certificates (Tạo bằng certbot)
    ssl_certificate     /etc/letsencrypt/live/congcu.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/congcu.co/privkey.pem;

    # SSL Settings chuẩn bảo mật cao (A+ trên Qualys SSL Labs)
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # HSTS — bắt buộc HTTPS trong 1 năm
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Rate limit cho API
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_conn conn 5;
        proxy_pass http://flowstate_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://flowstate_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Static files — cache 1 năm (Next.js đặt hash trong filename)
    location /_next/static/ {
        proxy_pass http://flowstate_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public assets
    location /public/ {
        proxy_pass http://flowstate_app;
        add_header Cache-Control "public, max-age=86400";
    }

    # Admin — giới hạn thêm
    location /admin {
        limit_conn conn 3;
        proxy_pass http://flowstate_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Mọi route còn lại
    location / {
        proxy_pass http://flowstate_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
