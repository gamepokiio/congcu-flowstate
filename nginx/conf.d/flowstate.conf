# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Nginx Virtual Host — FlowState
# Domain: congcu.co
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Upstream — Next.js app
upstream flowstate_app {
    server app:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────
server {
    listen 80;
    server_name congcu.co www.congcu.co;

    # Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ──────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name congcu.co www.congcu.co;

    # Enable HTTP/2 (cú pháp mới cho nginx 1.25+)
    http2 on;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/congcu.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/congcu.co/privkey.pem;

    # SSL Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Rate limit cho API auth
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_conn conn 5;
        proxy_pass http://flowstate_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://flowstate_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files — cache 1 năm
    location /_next/static/ {
        proxy_pass http://flowstate_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public assets
    location /public/ {
        proxy_pass http://flowstate_app;
        add_header Cache-Control "public, max-age=86400";
    }

    # Admin
    location /admin {
        limit_conn conn 3;
        proxy_pass http://flowstate_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Mọi route còn lại
    location / {
        proxy_pass http://flowstate_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
